<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#050203" />

    <title>LUCKYPROTOCOL · Proof of Luck on Bitcoin</title>
    <meta name="description" content="Probabilistic-mint protocol tokens on Bitcoin mainnet. Self-custody wallet, in-browser indexer, no servers. Bet block-hash outcomes for fungible tokens — every mint, transfer, and deploy is a real Bitcoin transaction." />
    <meta name="application-name" content="LUCKYPROTOCOL" />
    <meta name="apple-mobile-web-app-title" content="LUCKYPROTOCOL" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Wallet-app hygiene: do not let search engines index the user-
         visible app surface. X-Frame-Options is intentionally NOT set
         here as a <meta> — browsers hard-reject it from meta, only
         honoring the HTTP response header. The real clickjacking
         defense is `frame-ancestors 'none'` in the CSP shipped via
         public/_headers, vercel.json, and Caddyfile, plus the HTTP
         `X-Frame-Options: DENY` response header from the same files. -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph / Twitter card — used by Telegram, Twitter, Discord etc.
         when someone pastes the URL. The icon doubles as the share image
         because it's the same brand mark on the lobby screen. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LUCKYPROTOCOL · Proof of Luck on Bitcoin" />
    <meta property="og:description" content="Probabilistic-mint protocol tokens on Bitcoin mainnet. Self-custody wallet, in-browser indexer." />
    <meta property="og:image" content="/icon.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LUCKYPROTOCOL" />
    <meta name="twitter:description" content="Proof of Luck on Bitcoin mainnet." />
    <meta name="twitter:image" content="/icon.png" />

    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        background: #050203;
        color: #e9d4a4;
        height: 100%;
        font-family: system-ui, sans-serif;
      }
      #root { display: flex; }

      /* Anti-phishing footer chip. Rendered OUTSIDE the React tree so
         it never unmounts and React state can't accidentally hide it.
         Lives bottom-right on every screen — small enough not to crowd
         the casino UI, persistent enough that returning users train
         themselves to look for it. A phishing clone running on
         lucky-protocol.com / luckyprotocol.xyz / etc. CAN copy this
         text trivially, so it is NOT a tamper-evidence indicator —
         the prompt "verify URL bar" is what does the work. */
      #anti-phishing-banner {
        position: fixed;
        bottom: 8px;
        right: 8px;
        z-index: 99999;
        background: rgba(15, 8, 6, 0.92);
        color: #d4af37;
        border: 1px solid rgba(212, 175, 55, 0.45);
        padding: 6px 10px;
        font-size: 10px;
        line-height: 1.4;
        border-radius: 6px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        max-width: 280px;
        pointer-events: none;
        user-select: none;
        backdrop-filter: blur(4px);
      }
      #anti-phishing-banner b { color: #ffe589; }
      @media (max-width: 480px) {
        #anti-phishing-banner {
          left: 8px;
          right: 8px;
          max-width: none;
          text-align: center;
          font-size: 9.5px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Anti-phishing banner — see CSS above. Static markup, no JS
         hooks, so the message survives even if the React bundle fails
         to load (which would itself be a strong "something's wrong"
         signal a user should heed). -->
    <div id="anti-phishing-banner">
      🔒 Official URL: <b>lucky-protocol.xyz</b><br>
      Always verify the address bar before entering your password.
    </div>
    <noscript>
      <div style="padding:40px; max-width:540px; margin:60px auto; color:#e9d4a4;">
        <h1 style="color:#d4af37;">LUCKYPROTOCOL requires JavaScript</h1>
        <p>This is a self-custody Bitcoin wallet + protocol indexer that runs
        entirely in your browser. JavaScript is required for the wallet's
        Argon2id key derivation, AES-256-GCM encryption, BIP39 seed
        generation, and Esplora-direct chain queries — none of it can be
        served from a server.</p>
        <p>Re-enable JavaScript and reload. No data is sent off this device.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
